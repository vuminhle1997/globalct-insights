name: Build and Push FastAPI & Next.js to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASENAME: ${{ github.repository }}
  FRONTEND_BACKEND_URL: https://api.insights.globalct.com

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          backend_tags="${REGISTRY}/${IMAGE_BASENAME}/fastapi:${short_sha}"
          frontend_tags="${REGISTRY}/${IMAGE_BASENAME}/nextjs:${short_sha}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            backend_tags+=$'\n'"${REGISTRY}/${IMAGE_BASENAME}/fastapi:${GITHUB_REF_NAME}"
            frontend_tags+=$'\n'"${REGISTRY}/${IMAGE_BASENAME}/nextjs:${GITHUB_REF_NAME}"
            app_version="${GITHUB_REF_NAME}"
          else
            app_version="${short_sha}"
          fi

          {
            echo "backend_tags<<EOF"
            echo "${backend_tags}"
            echo "EOF"
            echo "frontend_tags<<EOF"
            echo "${frontend_tags}"
            echo "EOF"
            echo "app_version=${app_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push FastAPI Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.backend_tags }}
          build-args: |
            PORT=4000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Next.js Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.frontend_tags }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ env.FRONTEND_BACKEND_URL }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.meta.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
