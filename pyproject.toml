[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
ruff = "^0.15.12"

[tool.ruff]
# Global Settings
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# Select Rules:
# E/W = pycodestyle, F = Pyflakes, I = isort (imports)
# UP = pyupgrade, B = flake8-bugbear
select = ["E", "F", "I", "UP", "B"]
# Explicitly enable E501 if you want "Line too long" to show as a linter error
extend-select = ["E501"]

[tool.ruff.lint.isort]
# Ensure imports are sorted correctly before they are checked for usage
combine-as-imports = true

[tool.ruff.format]
# Core Formatting (replaces Black)
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
# Automatically format code snippets in your docstrings
docstring-code-format = true

[tool.ruff.lint.per-file-ignores]
# Special handling for __init__.py files
# Often we WANT "unused" imports here for re-exporting.
# This prevents Ruff from deleting them automatically.
"__init__.py" = ["F401"]

